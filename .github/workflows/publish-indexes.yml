name: Publish indexes image

on:
  push:
    branches:
      - add-product-query-indexes

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push indexes image
        run: ./gradlew bootBuildImage --imageName fabianofsc/nexus-shopping:indexes

      - name: Push image
        run: docker push fabianofsc/nexus-shopping:indexes
