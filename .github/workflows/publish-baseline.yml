name: Publish baseline image

on:
  push:
    branches:
      - missing-index-performance-baseline

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push baseline image
        run: ./gradlew bootBuildImage --imageName fabianofsc/nexus-shopping:baseline --imagePlatforms linux/amd64,linux/arm64

      - name: Push image
        run: docker push fabianofsc/nexus-shopping:baseline
