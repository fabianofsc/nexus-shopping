services:
  app:
    image: ${APP_IMAGE:-nexus-shopping:local}
    container_name: nexus-shopping-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexus_shopping
      DB_USERNAME: nexus
      DB_PASSWORD: nexus
      PRODUCT_SEED_COUNT: ${PRODUCT_SEED_COUNT:-10000000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nexus-shopping-postgres
    environment:
      POSTGRES_DB: nexus_shopping
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_shopping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
