services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-shopping-postgres
    environment:
      POSTGRES_DB: nexus_shopping
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_shopping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
